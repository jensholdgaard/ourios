name: OpenSSF Scorecard

# Supply-chain / repo-hygiene analysis published to the OpenSSF
# Scorecard API (the README badge reads from it) and to GitHub
# code scanning. Weekly + on pushes to main; results are public,
# matching the public repo.

on:
  schedule:
    - cron: '30 2 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Publishing to the scorecard API uses OIDC; the SARIF upload
      # feeds the code-scanning tab.
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
          # The default GITHUB_TOKEN can't read branch-protection
          # settings, so the Branch-Protection check errors out (-1).
          # A fine-grained PAT with `Administration: read` (stored as
          # the SCORECARD_TOKEN repo secret) lets the check read the
          # rules. Until that secret exists this falls back to
          # github.token — no break, Branch-Protection just stays -1.
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}
      - uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: results.sarif
