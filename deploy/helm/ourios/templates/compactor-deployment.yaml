{{- if .Values.compactor.enabled }}
{{- /*
The background compactor (RFC 0009) as a singleton Deployment: it sets neither
the receiver nor the querier role env, so this process only sweeps the shared
store. It is the chart's sole sweeper — the receiver/querier set
OURIOS_COMPACTION_ENABLED=0. Pinned to one replica (see the README "Compactor
topology" section).
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ourios.fullname" . }}-compactor
  labels:
    {{- include "ourios.labels" . | nindent 4 }}
    app.kubernetes.io/component: compactor
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ourios.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: compactor
  template:
    metadata:
      labels:
        {{- include "ourios.labels" . | nindent 8 }}
        app.kubernetes.io/component: compactor
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.compactor.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the pods when the mounted RFC 0020 config changes.
        checksum/config: {{ include "ourios.config" (dict "root" . "role" "compactor") | trim | sha256sum }}
        {{- with (include "ourios.podAnnotations" (dict "global" .Values.podAnnotations "role" .Values.compactor.podAnnotations)) }}
        {{- . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ourios.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ourios-server
          image: {{ include "ourios.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            - --config
            - /etc/ourios/config.yaml
          {{- $env := include "ourios.commonEnv" . | trim }}
          {{- if $env }}
          env:
            {{- $env | nindent 12 }}
          {{- end }}
          {{- include "ourios.s3CredentialsEnvFrom" . | nindent 10 }}
          {{- with .Values.compactor.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- include "ourios.configVolumeMount" . | nindent 12 }}
            {{- include "ourios.dataVolumeMount" . | nindent 12 }}
            # readOnlyRootFilesystem is on, so give the process a writable /tmp.
            - name: tmp
              mountPath: /tmp
      volumes:
        {{- include "ourios.configVolume" (dict "root" . "role" "compactor") | nindent 8 }}
        - name: tmp
          emptyDir: {}
        {{- include "ourios.dataVolume" . | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
