# Compose override for the OTel Demo corpus capture
# (`capture-otel-demo-corpus.yml`). Layered onto the demo's
# docker-compose.yml via the workflow's `COMPOSE_FILE` job env
# (`docker-compose.yml:<this>`), so every `docker compose` call
# picks it up without repeating `-f`.
#
# Bind-mounts a runner-side directory into the collector at
# `/capture`, the path the file/corpus exporter writes to (see
# otel-demo-capture-extras.yml). The demo's collector is a
# distroless image with no writable `/tmp`, so the exporter needs
# a directory that demonstrably exists — a host bind-mount
# guarantees that and lands the corpus straight on the runner
# filesystem, no `docker cp`.
#
# `${OURIOS_CAPTURE_DIR}` is an absolute host path the workflow
# exports + `mkdir`s before `up`. Absolute (not relative) so it
# doesn't depend on Compose's project-directory resolution when
# the override is supplied from a different directory than the
# base compose file.
#
# The `load-generator` overrides bypass `frontend-proxy` (Envoy):
# the published frontend-proxy image carries a baked Envoy
# bootstrap with a 10th cluster whose address env var the demo
# doesn't set, so Envoy fails proto validation and crash-loops in
# CI — which is what flooded the first capture with the load
# generator's `ERR_NAME_NOT_RESOLVED` (intermittent DNS for a
# flapping container). Driving the `frontend` HTTP API directly
# (browser traffic off) removes Envoy from the path entirely; the
# frontend still fans out to cart / checkout / currency /
# product-catalog / …, so the business-service log diversity we
# want still flows. `environment` entries merge by key, so these
# override the base compose's defaults.
#
# BOTH load-generator eras are configured side by side — Locust
# (demo ≤ 2.2.0: `LOCUST_*`) and k6 (demo main/2.3+:
# `K6_TARGET_URL` / `K6_BROWSER_ENABLED`) — because a container
# simply ignores the other era's env vars. Same intent per era:
# drive the frontend directly, browser traffic off (k6's browser
# scenario is opt-in-off by default; pinned explicitly anyway so
# the capture profile never inherits an upstream default flip).

services:
  otel-collector:
    volumes:
      - ${OURIOS_CAPTURE_DIR}:/capture
  load-generator:
    environment:
      - LOCUST_BROWSER_TRAFFIC_ENABLED=false
      - LOCUST_HOST=http://frontend:${FRONTEND_PORT}
      - K6_BROWSER_ENABLED=false
      - K6_TARGET_URL=http://frontend:${FRONTEND_PORT}
