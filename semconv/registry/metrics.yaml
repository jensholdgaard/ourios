groups:
  - id: metric.ourios.compaction.sweeps
    type: metric
    metric_name: ourios.compaction.sweeps
    stability: development
    brief: Number of compaction sweeps executed, by outcome.
    instrument: counter
    unit: "{sweep}"
    attributes:
      - ref: ourios.compaction.result
        requirement_level: required

  - id: metric.ourios.compaction.partitions
    type: metric
    metric_name: ourios.compaction.partitions
    stability: development
    brief: Number of partitions consolidated.
    instrument: counter
    unit: "{partition}"

  - id: metric.ourios.compaction.files
    type: metric
    metric_name: ourios.compaction.files
    stability: development
    brief: Number of input files merged away by compaction.
    instrument: counter
    unit: "{file}"

  - id: metric.ourios.compaction.rows
    type: metric
    metric_name: ourios.compaction.rows
    stability: development
    brief: Number of rows rewritten during consolidation.
    instrument: counter
    unit: "{row}"

  - id: metric.ourios.compaction.io
    type: metric
    metric_name: ourios.compaction.io
    stability: development
    brief: Bytes read from inputs and written to the consolidated file.
    instrument: counter
    unit: "By"
    attributes:
      - ref: ourios.io.direction
        requirement_level: required

  - id: metric.ourios.compaction.duration
    type: metric
    metric_name: ourios.compaction.duration
    stability: development
    brief: Wall-clock duration of a compaction sweep.
    instrument: histogram
    unit: "s"
    attributes:
      - ref: ourios.compaction.result
        requirement_level: required

  - id: metric.ourios.compaction.orphan.files
    type: metric
    metric_name: ourios.compaction.orphan.files
    stability: development
    brief: Superseded input files that could not be removed after commit.
    instrument: counter
    unit: "{file}"

  - id: metric.ourios.compaction.backlog
    type: metric
    metric_name: ourios.compaction.backlog
    stability: development
    brief: Sealed partitions awaiting compaction.
    instrument: updowncounter
    unit: "{partition}"
    attributes:
      - ref: ourios.tenant
        requirement_level: required

  - id: metric.ourios.storage.parquet.file.size
    type: metric
    metric_name: ourios.storage.parquet.file.size
    stability: development
    brief: Sizes of published Parquet data files (hazard H4 detector).
    instrument: histogram
    unit: "By"
    attributes:
      - ref: ourios.tenant
        requirement_level: required

  # Template-miner metrics (RFC 0001 §6.8).

  - id: metric.ourios.miner.template.count
    type: metric
    metric_name: ourios.miner.template.count
    stability: development
    brief: Number of templates a tenant currently has (Drain-tree leaves plus structured-body templates).
    instrument: gauge
    unit: "{template}"
    attributes:
      - ref: ourios.tenant
        requirement_level: required

  - id: metric.ourios.miner.merges
    type: metric
    metric_name: ourios.miner.merges
    stability: development
    brief: Template change events (wildcard widening, slot type-expansion).
    instrument: counter
    unit: "{merge}"
    attributes:
      - ref: ourios.tenant
        requirement_level: required
      - ref: ourios.miner.template_change
        requirement_level: required

  - id: metric.ourios.miner.parse_failures
    type: metric
    metric_name: ourios.miner.parse_failures
    stability: development
    brief: Lines that failed to parse and fell back to body retention.
    instrument: counter
    unit: "{failure}"
    attributes:
      - ref: ourios.tenant
        requirement_level: required
      - ref: ourios.service
        requirement_level: recommended

  - id: metric.ourios.miner.params.overflow
    type: metric
    metric_name: ourios.miner.params.overflow
    stability: development
    brief: Per-parameter byte-limit overflow events (§3.2).
    instrument: counter
    unit: "{overflow}"
    attributes:
      - ref: ourios.tenant
        requirement_level: required
      - ref: ourios.service
        requirement_level: recommended

  - id: metric.ourios.miner.template.version_changes
    type: metric
    metric_name: ourios.miner.template.version_changes
    stability: development
    brief: Template-version increments (schema evolution, §3.5 / H5).
    instrument: counter
    unit: "{change}"
    attributes:
      - ref: ourios.tenant
        requirement_level: required

  - id: metric.ourios.miner.confidence
    type: metric
    metric_name: ourios.miner.confidence
    stability: development
    brief: Per-line parse-confidence distribution.
    instrument: histogram
    unit: "1"
    attributes:
      - ref: ourios.tenant
        requirement_level: required
      - ref: ourios.service
        requirement_level: recommended

  - id: metric.ourios.miner.duration
    type: metric
    metric_name: ourios.miner.duration
    stability: development
    brief: Per-line miner processing duration (hot-path budget D1).
    instrument: histogram
    unit: "s"
    attributes:
      - ref: ourios.tenant
        requirement_level: required

  - id: metric.ourios.miner.confidence.p50
    type: metric
    metric_name: ourios.miner.confidence.p50
    stability: development
    brief: >-
      Median parse confidence, an in-process named view of the
      `ourios.miner.confidence` histogram (RFC 0001 §6.8, RFC0001.8).
    instrument: gauge
    unit: "1"
    attributes:
      - ref: ourios.tenant
        requirement_level: required
      - ref: ourios.service
        requirement_level: recommended

  - id: metric.ourios.miner.confidence.p01
    type: metric
    metric_name: ourios.miner.confidence.p01
    stability: development
    brief: >-
      1st-percentile parse confidence, an in-process named view of the
      `ourios.miner.confidence` histogram (RFC 0001 §6.8, RFC0001.8).
    instrument: gauge
    unit: "1"
    attributes:
      - ref: ourios.tenant
        requirement_level: required
      - ref: ourios.service
        requirement_level: recommended

  - id: metric.ourios.miner.body_retention.utilization
    type: metric
    metric_name: ourios.miner.body_retention.utilization
    stability: development
    brief: Fraction of lines whose original body was retained on a §6.3 confidence-zone path (lossy zone or parse failure).
    instrument: gauge
    unit: "1"
    attributes:
      - ref: ourios.tenant
        requirement_level: required

  - id: metric.ourios.miner.params.overflow.utilization
    type: metric
    metric_name: ourios.miner.params.overflow.utilization
    stability: development
    brief: >-
      Fraction of lines with at least one overflowing parameter
      (§3.2 / H2 per-service overflow alert).
    instrument: gauge
    unit: "1"
    attributes:
      - ref: ourios.tenant
        requirement_level: required
      - ref: ourios.service
        requirement_level: recommended

  - id: metric.ourios.miner.alias.assertions
    type: metric
    metric_name: ourios.miner.alias.assertions
    stability: development
    brief: Operator-driven template-alias assertions recorded.
    instrument: counter
    unit: "{assertion}"
    attributes:
      - ref: ourios.tenant
        requirement_level: required

  - id: metric.ourios.miner.alias.retractions
    type: metric
    metric_name: ourios.miner.alias.retractions
    stability: development
    brief: Operator-driven template-alias retractions recorded.
    instrument: counter
    unit: "{retraction}"
    attributes:
      - ref: ourios.tenant
        requirement_level: required

  # Ingest write path (RFC 0014 §6.3 / RFC 0008): throughput + the
  # WAL-before-ack durability latency. Aggregate (no tenant/service
  # attributes) so a performance run reads system throughput directly.
  - id: metric.ourios.ingest.records
    type: metric
    metric_name: ourios.ingest.records
    stability: development
    brief: Log records accepted by the ingest pipeline (post-WAL-durable).
    instrument: counter
    unit: "{record}"

  - id: metric.ourios.ingest.batches
    type: metric
    metric_name: ourios.ingest.batches
    stability: development
    brief: OTLP batches accepted by the ingest pipeline.
    instrument: counter
    unit: "{batch}"

  - id: metric.ourios.wal.append.duration
    type: metric
    metric_name: ourios.wal.append.duration
    stability: development
    brief: >-
      Wall-clock time to append a batch to the WAL and make it durable
      (append + fsync) — the WAL-before-ack latency (`CLAUDE.md` §3.4).
    instrument: histogram
    unit: "s"

  # RFC 0014 record sink (the data write path). `flush.trigger` tells why
  # a partition flushed; the histogram's count is the flush count.
  - id: metric.ourios.sink.flush.duration
    type: metric
    metric_name: ourios.sink.flush.duration
    stability: development
    brief: Wall-clock time to encode + write one partition's Parquet object.
    instrument: histogram
    unit: "s"
    attributes:
      - ref: ourios.sink.flush.trigger
        requirement_level: required

  - id: metric.ourios.sink.flush.records
    type: metric
    metric_name: ourios.sink.flush.records
    stability: development
    brief: Records written out across sink flushes.
    instrument: counter
    unit: "{record}"
    attributes:
      - ref: ourios.sink.flush.trigger
        requirement_level: required

  - id: metric.ourios.sink.flush.errors
    type: metric
    metric_name: ourios.sink.flush.errors
    stability: development
    brief: >-
      Failed partition flushes (encode or store error). The buffer is
      retained and retried — the WAL is the durability of record.
    instrument: counter
    unit: "{error}"

  - id: metric.ourios.sink.derive.errors
    type: metric
    metric_name: ourios.sink.derive.errors
    stability: development
    brief: >-
      Records dropped from the sink because a partition key could not be
      derived (the WAL still holds them).
    instrument: counter
    unit: "{error}"

  - id: metric.ourios.sink.buffer.usage
    type: metric
    metric_name: ourios.sink.buffer.usage
    stability: development
    brief: >-
      Estimated bytes currently buffered across all partitions, against
      the hard ceiling (RFC0014.4).
    instrument: updowncounter
    unit: "By"

  - id: metric.ourios.query.duration
    type: metric
    metric_name: ourios.query.duration
    stability: development
    brief: >-
      Duration of a query served by the querier endpoint, by kind
      (RFC 0016). Follows the OTel `{operation}.duration` convention; a
      failed query carries the `error.type` attribute.
    instrument: histogram
    unit: "s"
    attributes:
      - ref: ourios.query.kind
        requirement_level: required

  - id: metric.ourios.query.row_groups
    type: metric
    metric_name: ourios.query.row_groups
    stability: development
    brief: >-
      Candidate row groups a query scanned vs. pruned (pillar #1's
      footer-skip; the B1 win). The two states partition the candidates,
      so the pruned fraction is derived as `pruned / (scanned + pruned)`.
    instrument: counter
    unit: "{row_group}"
    attributes:
      - ref: ourios.query.row_group.state
        requirement_level: required
