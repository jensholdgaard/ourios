name: dco

# Developer Certificate of Origin gate. Every non-merge commit in a PR must
# carry a `Signed-off-by:` trailer whose email matches the commit author
# (DCO 1.1, https://developercertificate.org/) — separate from cryptographic
# signing, which proves identity rather than certifying the right to submit.
#
# Self-contained (no third-party action) to keep the supply-chain surface
# minimal, mirroring the licenses gate. PRs *opened by* a bot actor
# (Renovate, Dependabot) are exempted wholesale: their commits carry no human
# sign-off and gating them would break dependency auto-merge. The exemption
# keys off the trusted PR actor login, not commit author fields, so it can't
# be bypassed by forging metadata.

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dco:
    name: sign-off (DCO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify every commit is signed off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # PR *actor* login from the trusted event payload — not forgeable
          # commit metadata. This is the only bot-detection signal a
          # contributor cannot spoof (setting user.name to `x[bot]` would).
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          # Exempt bot-opened PRs (Renovate/Dependabot) wholesale — their
          # commits carry no human sign-off and gating them would break
          # dependency auto-merge. Rooted in the GitHub-authenticated actor,
          # so it cannot be bypassed by forging per-commit author fields.
          case "$PR_AUTHOR" in
            *'[bot]')
              echo "PR opened by bot actor ${PR_AUTHOR}; DCO sign-off not required."
              exit 0
              ;;
          esac
          fail=0
          for sha in $(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}"); do
            author_email="$(git show -s --format='%ae' "$sha")"
            author_name="$(git show -s --format='%an' "$sha")"
            # A matching Signed-off-by trailer: same email as the author.
            if git show -s --format='%B' "$sha" \
                | grep -i '^Signed-off-by:' | grep -qiF "<${author_email}>"; then
              continue
            fi
            fail=1
            # Plain stderr, never a `::error::` workflow command: author_name /
            # author_email are attacker-controlled on fork PRs and could carry
            # newlines or %-escapes, enabling workflow-command injection.
            printf 'missing sign-off: %s by %s <%s>\n' \
              "$sha" "$author_name" "$author_email" >&2
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more commits are missing a Developer Certificate of Origin sign-off."
            echo "Sign off your commits with 'git commit -s' (or amend an existing" >&2
            echo "branch: 'git rebase --signoff ${BASE_SHA}'). See CONTRIBUTING.md." >&2
            exit 1
          fi
          echo "All non-merge commits are signed off."
