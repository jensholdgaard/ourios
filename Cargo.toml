[workspace]
resolver = "3"
members = [
    "crates/ourios-bench",
    "crates/ourios-core",
    "crates/ourios-ingester",
    "crates/ourios-miner",
    "crates/ourios-parquet",
    "crates/ourios-querier",
    "crates/ourios-telemetry",
    "crates/ourios-wal",
]

# Remaining members per CLAUDE.md §7 layout will be added as crates land:
#   crates/ourios-server

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
repository = "https://github.com/jensholdgaard/ourios"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
