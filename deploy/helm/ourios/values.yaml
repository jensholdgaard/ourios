# Default values for the ourios chart.
# This is a YAML-formatted file. Values declared here are the contract with
# the templates; the env-var names below are the server's actual contract
# (crates/ourios-server/src/main.rs).

# -- Number of ourios-server replicas. The server always runs the background
# compaction role; see the note on `wal` and `bucket` below before scaling
# the receiver role past 1 (each replica writes its own WAL).
replicaCount: 1

image:
  # The GHCR image published by the container-image track.
  repository: ghcr.io/jensholdgaard/ourios
  pullPolicy: IfNotPresent
  # Image tag. Defaults to the chart's appVersion when left empty.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a ServiceAccount.
  create: true
  # -- Annotations to add to the ServiceAccount (e.g. an IRSA / Workload
  # Identity role binding granting the pod access to the object-storage bucket).
  annotations: {}
  # -- ServiceAccount name. Generated from the fullname when empty.
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -------------------------------------------------------------------------
# Ourios server configuration.
#
# The server is configured ENTIRELY by environment variables. Two storage
# concepts are deliberately distinct and must not be conflated:
#
#   * bucket   — the object-storage root (OURIOS_BUCKET_ROOT). This is the
#                source of truth for both Parquet data and audit events
#                (CLAUDE.md §3.6). It is S3-compatible object storage, so it
#                is a CONFIG VALUE (a URI/path), NOT a Kubernetes volume.
#
#   * wal      — the write-ahead log root (OURIOS_WAL_ROOT). This is LOCAL
#                disk, required only when the receiver role is enabled
#                (CLAUDE.md §3.4 WAL-before-ack). It is backed by a
#                PersistentVolumeClaim so an acknowledged batch survives a
#                pod restart and crash recovery can replay it.
# -------------------------------------------------------------------------
ourios:
  # -- REQUIRED. Where the server writes Parquet + audit events and the
  # compactor sweeps (OURIOS_BUCKET_ROOT). NOTE: the binary uses a *local
  # filesystem* store today (it `create_dir_all`s this path), so it must
  # point at persistent storage — mount a volume and set this to a path on
  # it, or acknowledge data is lost on pod restart. S3-compatible object
  # storage (a URI here) is RFC 0013, in progress; until it lands, treat
  # this as a local path. No default — the server refuses to start without
  # it, so it MUST be set per install.
  bucketRoot: ""

  # -- Compaction sweep cadence in seconds (OURIOS_COMPACTION_INTERVAL_SECS).
  # Optional; the server defaults to 300s when unset.
  compactionIntervalSecs: ""

  receiver:
    # -- Enable the OTLP receiver role (OURIOS_RECEIVER_ENABLED). When false,
    # the pod runs the compaction role only and exposes no listeners.
    enabled: true
    # -- gRPC OTLP bind address (OURIOS_RECEIVER_GRPC_ADDR).
    grpcAddr: "0.0.0.0:4317"
    # -- HTTP OTLP bind address (OURIOS_RECEIVER_HTTP_ADDR).
    httpAddr: "0.0.0.0:4318"

  # -- Extra environment variables passed verbatim to the container, e.g.
  # OTEL_EXPORTER_OTLP_ENDPOINT for the server's own telemetry, or
  # object-store credentials (AWS_ACCESS_KEY_ID, ...). List of {name, value}
  # or {name, valueFrom}.
  extraEnv: []

  # ----------------------------------------------------------------------
  # DEFERRED — query-serving role (RFC 0016, status: drafted).
  # The HTTP query listener (port 4319) and its OURIOS_QUERIER_* env surface
  # are intentionally NOT wired here. Do not invent that surface ahead of the
  # RFC. When RFC 0016 merges, add the querier env vars, a Service port, and
  # a `querier:` block under this key.
  # ----------------------------------------------------------------------
  # querier:
  #   enabled: false

# Write-ahead-log persistence (local disk, receiver role only — see the
# `ourios` block above). The mount path is wired to OURIOS_WAL_ROOT.
wal:
  # -- Mount path for the WAL inside the container; passed as OURIOS_WAL_ROOT.
  mountPath: /var/lib/ourios/wal
  persistence:
    # -- Use a PersistentVolumeClaim for the WAL. Strongly recommended: with
    # this false the WAL falls back to an emptyDir and acknowledged batches
    # are LOST on pod reschedule, violating the WAL-before-ack durability
    # contract (CLAUDE.md §3.4). emptyDir is for throwaway/dev only.
    enabled: true
    # -- StorageClass for the WAL PVC. Empty uses the cluster default.
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    # -- Annotations for the WAL PVC.
    annotations: {}

service:
  type: ClusterIP
  # OTLP receiver Service ports are derived from the port portion of
  # ourios.receiver.grpcAddr / httpAddr so they cannot drift from the
  # address the server actually binds. Rendered only when the receiver is
  # enabled.
  annotations: {}
  # DEFERRED — the query Service port (4319) lands with RFC 0016. Not exposed
  # now; do not add a querier port until that RFC merges.

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

livenessProbe:
  tcpSocket:
    port: otlp-grpc
  initialDelaySeconds: 10
  periodSeconds: 20
readinessProbe:
  tcpSocket:
    port: otlp-grpc
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
# -- Graceful shutdown window. The server drains receiver listeners and
# flushes telemetry on SIGTERM; give it room before SIGKILL.
terminationGracePeriodSeconds: 60
