name: ClusterFuzzLite batch fuzzing

# Continuous fuzzing of the RFC 0015 targets (Phase 2). Builds the
# fuzzers from .clusterfuzzlite/ and fuzzes each for a batch budget,
# persisting the growing corpus in the GitHub Actions cache between runs
# (no external storage backend). Deliberately schedule + dispatch only —
# never per-PR (RFC 0015 §3.4; the smoke gate is fuzz.yml).

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  batch-fuzzing:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - name: Build fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: rust
          sanitizer: ${{ matrix.sanitizer }}
      - name: Run fuzzers (${{ matrix.sanitizer }})
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 600
          mode: batch
          sanitizer: ${{ matrix.sanitizer }}
