name: Build and deploy docs

# Wired but not yet triggered on push. Flip the commented block below
# once GitHub Pages is enabled in the repo settings and the first
# release milestone has landed.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'docs/**'
  #     - 'book.toml'
  #     - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2
        with:
          mdbook-version: '0.5.2'

      # The Mermaid preprocessor (declared in book.toml) must be on
      # PATH or `mdbook build` fails; see docs/rfcs/README.md.
      - name: Install mdbook-mermaid
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: mdbook-mermaid@0.17.0

      - name: Build book
        run: mdbook build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
