name: Deploy smoke test (kind)

# End-to-end deploy validation (first shipping milestone): spin up an ephemeral
# kind cluster, deploy the Ourios Helm chart against an in-cluster LocalStack
# (the S3-compatible store the chart's production path uses), then exercise the
# real path — push an OTLP log at the receiver with telemetrygen (over gRPC) and
# read it back through the querier, asserting the body reconstructs
# bit-identically. There is no persistent cluster, so this IS the
# deploy target; managed K8s (AKS/GKE) + bare metal come later as separate infra.
#
# On-demand + nightly (not per-PR): a kind boot + image build + deploy is too
# heavy to gate every PR, and chart/image regressions are caught daily.
on:
  workflow_dispatch:
  schedule:
    # Nightly, offset from the other scheduled jobs.
    - cron: '37 4 * * *'

permissions:
  contents: read

env:
  # Image built from the current checkout and loaded into kind (tests the code
  # under test + the chart together; no registry pull, no package-visibility
  # dependency).
  IMAGE_REPO: ourios
  IMAGE_TAG: smoke
  KIND_CLUSTER: ourios-smoke
  # Tenant == the service.name resource attribute (TenantRule::service_name),
  # so the ingested service.name and the query's X-Ourios-Tenant must match.
  TENANT: ourios-smoke
  S3_BUCKET: ourios-smoke
  # The log line we ingest and expect the querier to reconstruct bit-identically
  # from its template + params (CLAUDE.md §3.3; the #302 audit-event fix).
  LOG_BODY: user 1 logged in

jobs:
  deploy-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: helm lint
        run: helm lint deploy/helm/ourios

      # Build the amd64 image from the current Dockerfile (the runner is amd64;
      # the multi-arch release path is image.yml's job, not this smoke test).
      - name: Build image
        run: docker build -t "${IMAGE_REPO}:${IMAGE_TAG}" .

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: ${{ env.KIND_CLUSTER }}

      - name: Load image into kind
        run: kind load docker-image "${IMAGE_REPO}:${IMAGE_TAG}" --name "${KIND_CLUSTER}"

      # In-cluster S3: LocalStack (Apache-2.0; the same S3 backend the parquet/
      # server integration tests use). One Deployment + ClusterIP Service.
      - name: Deploy LocalStack (in-cluster S3)
        run: |
          kubectl apply -f - <<'YAML'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: localstack
            labels: { app: localstack }
          spec:
            replicas: 1
            selector: { matchLabels: { app: localstack } }
            template:
              metadata: { labels: { app: localstack } }
              spec:
                containers:
                  - name: localstack
                    # Pinned by digest for reproducible CI (tag comment lets Renovate bump).
                    image: localstack/localstack:4.14.0@sha256:3ebc37595918b8accb852f8048fef2aff047d465167edd655528065b07bc364a
                    env:
                      - { name: SERVICES, value: s3 }
                    ports:
                      - containerPort: 4566
                    readinessProbe:
                      httpGet: { path: /_localstack/health, port: 4566 }
                      initialDelaySeconds: 5
                      periodSeconds: 5
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: localstack
          spec:
            selector: { app: localstack }
            ports:
              - port: 4566
                targetPort: 4566
          YAML
          kubectl rollout status deploy/localstack --timeout=180s

      - name: Create S3 bucket
        run: kubectl exec deploy/localstack -- awslocal s3 mb "s3://${S3_BUCKET}"

      # LocalStack accepts any credentials; the chart injects these via envFrom.
      - name: Create S3 credentials Secret
        run: |
          kubectl create secret generic ourios-s3 \
            --from-literal=OURIOS_S3_ACCESS_KEY_ID=test \
            --from-literal=OURIOS_S3_SECRET_ACCESS_KEY=test

      - name: helm install
        run: |
          helm install ourios deploy/helm/ourios \
            --set image.repository="${IMAGE_REPO}" \
            --set image.tag="${IMAGE_TAG}" \
            --set image.pullPolicy=Never \
            --set storage.backend=s3 \
            --set storage.s3.bucket="${S3_BUCKET}" \
            --set storage.s3.endpoint=http://localstack:4566 \
            --set storage.s3.region=us-east-1 \
            --set storage.s3.existingSecret=ourios-s3 \
            --set querier.replicas=1 \
            --set compactor.intervalSecs=30 \
            --wait --timeout 5m

      - name: Wait for workloads
        run: |
          kubectl rollout status statefulset/ourios-receiver --timeout=180s
          kubectl rollout status deploy/ourios-querier --timeout=180s
          kubectl rollout status deploy/ourios-compactor --timeout=180s

      # Ingest one OTLP log over gRPC (:4317) with telemetrygen — the
      # OpenTelemetry synthetic-telemetry generator — run as an in-cluster Job
      # against the receiver's gRPC service. A real OTLP client on the wire, not
      # a hand-built payload. service.name is the tenant; --body is the line the
      # querier must reconstruct. Image pinned by digest.
      - name: Ingest OTLP logs (telemetrygen, gRPC)
        run: |
          kubectl apply -f - <<YAML
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: otlp-ingest
          spec:
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: telemetrygen
                    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.155.0@sha256:32d1762abb401e36dd8cfdf60a71075b41bd996a0cfb7c8d2e6eac4d609625b9
                    args:
                      - logs
                      - --otlp-endpoint=ourios-receiver:4317
                      - --otlp-insecure
                      - --logs=1
                      - --otlp-attributes=service.name="${TENANT}"
                      - --body=${LOG_BODY}
          YAML
          kubectl wait --for=condition=complete job/otlp-ingest --timeout=120s \
            || { echo "telemetrygen job did not complete"; kubectl logs job/otlp-ingest --tail=100 || true; kubectl describe job/otlp-ingest || true; exit 1; }
          echo "telemetrygen output:"; kubectl logs job/otlp-ingest --tail=20 || true

      # Records buffer in the sink until a size/age (300s) flush. Graceful
      # shutdown drains the sink to S3, so restart the receiver to force a prompt
      # flush, then the querier (reading the shared store) can see the data.
      - name: Force flush via receiver restart
        run: |
          kubectl rollout restart statefulset/ourios-receiver
          kubectl rollout status statefulset/ourios-receiver --timeout=180s

      - name: Query the logs back
        run: |
          q=ourios-querier
          kubectl port-forward "svc/${q}" 4319:4319 >/tmp/pf-q.log 2>&1 &
          pf=$!; trap 'kill $pf 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do if (echo > /dev/tcp/127.0.0.1/4319) >/dev/null 2>&1; then break; fi; sleep 1; done
          # Succeed only once the row is back AND its body reconstructs to the
          # ingested line — exercises the full path (audit template events →
          # read-time registry → bit-identical render; CLAUDE.md §3.3 / #302),
          # not just that a row exists. Audit events flush before the data (the
          # sink's audit barrier), so a visible row implies a derivable registry.
          rows=0; line=""; recon=""
          for i in $(seq 1 30); do
            out="$(curl -s -X POST 'http://127.0.0.1:4319/v1/query' \
              -H "X-Ourios-Tenant: ${TENANT}" \
              -H 'Content-Type: text/plain' \
              --data "service == \"${TENANT}\" | range(-1h, now) | limit 100" || true)"
            rows="$(printf '%s' "$out" | jq -r '.rows // 0' 2>/dev/null || echo 0)"
            line="$(printf '%s' "$out" | jq -r '.records[0].body.line // ""' 2>/dev/null || echo "")"
            recon="$(printf '%s' "$out" | jq -r '.records[0].body.reconstruction // ""' 2>/dev/null || echo "")"
            echo "attempt $i: rows=$rows line=\"$line\" reconstruction=$recon"
            if [ "${rows:-0}" -ge 1 ] && [ "$line" = "${LOG_BODY}" ] && [ "$recon" = "faithful" ]; then echo "$out" | jq .; break; fi
            sleep 5
          done
          [ "${rows:-0}" -ge 1 ] || { echo "query returned no rows"; exit 1; }
          [ "$line" = "${LOG_BODY}" ] || { echo "body did not reconstruct: got \"$line\" (reconstruction=$recon), want \"${LOG_BODY}\""; exit 1; }
          [ "$recon" = "faithful" ] || { echo "unexpected reconstruction kind: $recon (want faithful)"; exit 1; }
          echo "SMOKE OK — ingested log queried back with faithful body ($rows row(s): \"$line\")"

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -o wide || true
          kubectl describe pods || true
          echo "=== receiver logs ==="; kubectl logs -l app.kubernetes.io/component=receiver --tail=200 || true
          echo "=== querier logs ===";  kubectl logs -l app.kubernetes.io/component=querier --tail=200 || true
          echo "=== compactor logs ==="; kubectl logs -l app.kubernetes.io/component=compactor --tail=200 || true
          echo "=== localstack logs ==="; kubectl logs deploy/localstack --tail=100 || true
