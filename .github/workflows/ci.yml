name: CI

# Mirrors the verification list in CLAUDE.md §6.6. Runs on every PR
# and push to main. Cargo jobs operate on the workspace Cargo.toml at
# repo root (currently empty `members = []` until the first crate lands;
# cargo handles this cleanly).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  book:
    name: mdbook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.2'
      # RFC diagrams are Mermaid (docs/rfcs/README.md). The
      # preprocessor is declared in book.toml, so the binary must be
      # on PATH or `mdbook build` fails with "preprocessor not found".
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook-mermaid@0.17.0
      - run: mdbook build

  # Aggregate result so branch-protection rules need only require
  # a single check. Skipped Cargo jobs (pre-first-crate) pass through.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, book]
    if: always()
    steps:
      - name: Verify required checks
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed (skipped jobs treated as pass)."
