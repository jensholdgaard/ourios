name: Fuzz

# Bounded smoke-fuzz of the RFC 0015 cargo-fuzz targets. Each target runs
# for a short budget; a crash fails the job and uploads the reproducer.
# This is the Phase 1 gate (RFC0015.5) — continuous fuzzing with corpus
# persistence is Phase 2 (ClusterFuzzLite).
#
# libFuzzer requires nightly; it is contained to this job via an explicit
# `+nightly-<date>` invocation, so the stable pin in `rust-toolchain.toml`
# still governs every shipping crate. Not a required check.

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/ourios-miner/**"
      - "crates/ourios-ingester/**"
      - "crates/ourios-wal/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Pinned for reproducibility; bumped by Renovate like the other
  # toolchains (RFC 0015 §7).
  NIGHTLY: nightly-2026-06-01

jobs:
  smoke-fuzz:
    name: smoke-fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [miner_roundtrip, otlp_json, otlp_protobuf, wal_frame]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Free runner disk space
        run: .github/scripts/free-disk-space.sh
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: ${{ env.NIGHTLY }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-fuzz@0.13.2
      - name: Smoke-fuzz ${{ matrix.target }}
        env:
          # 60 s per target on PRs; 300 s on the daily schedule.
          BUDGET: ${{ github.event_name == 'schedule' && '300' || '60' }}
        run: |
          set -euo pipefail
          target='${{ matrix.target }}'
          # Force the gnu host triple. Left to default, cargo-fuzz picks
          # the musl target on the runner, whose statically-linked libc is
          # incompatible with the ASan sanitizer ("sanitizer is incompatible
          # with statically linked libc").
          host="$(rustc "+${NIGHTLY}" -vV | sed -n 's/^host: //p')"
          mkdir -p "fuzz/corpus/${target}"
          # Seed the working corpus from the committed seeds (RFC 0015 §3.3).
          # Copy the directory contents (`/.`) so an empty/odd glob can't
          # silently skip seeding; errors surface under `set -e` rather
          # than being swallowed.
          if [ -d "fuzz/seeds/${target}" ]; then
            cp -rn "fuzz/seeds/${target}/." "fuzz/corpus/${target}/"
          fi
          # `fuzz run` also builds, so a target that stops compiling fails
          # here too.
          cargo "+${NIGHTLY}" fuzz run "${target}" --target "${host}" -- -max_total_time="${BUDGET}"
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
