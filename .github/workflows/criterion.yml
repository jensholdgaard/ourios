name: Criterion

# Manually-triggered wall-clock run of the `ourios-bench` criterion
# micro-benches (the `benches/*.rs` targets: b1, b2, recovery, compaction,
# ingest_write_path). Distinct from `bench.yml`, which runs the thesis-gate
# `ourios-bench` *binary* (a1/c1/c2) against a corpus.
#
# These numbers are **indicative diagnostics** — GitHub's shared runners have
# variable CPU, so they are not comparable across runs and are not a baseline
# (the authoritative baseline-hardware run is a separate, opt-in job). Not
# gating; runs only on demand.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  criterion:
    name: cargo bench (indicative)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Free runner disk space
        run: .github/scripts/free-disk-space.sh
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run criterion benches
        run: cargo bench -p ourios-bench 2>&1 | tee bench-output.txt
      - name: Summarise into the run summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '## ourios-bench criterion micro-benches'
            echo
            echo '> **Indicative only** — a hosted runner is not the `docs/benchmarks.md` §1'
            echo '> hardware baseline (`baseline-8vcpu-32gib`); shared-runner CPU is variable,'
            echo '> so these are not comparable across runs and are not authoritative.'
            echo
            echo '```'
            # criterion prints a `<group>/<id>` line followed by `time:` /
            # `thrpt:` lines; keep those for a compact, readable summary.
            grep -E 'time:|thrpt:|^[A-Za-z0-9_]+/' bench-output.txt || tail -n 120 bench-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload criterion report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: criterion
          path: |
            target/criterion
            bench-output.txt
          if-no-files-found: warn
