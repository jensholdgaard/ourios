name: Build and deploy docs

# Builds the mdBook and deploys to GitHub Pages. The §6.7 gate (the
# `ourios-wal` crash-recovery test landing) has cleared and Pages is
# enabled (Settings → Pages → Source: GitHub Actions), so docs now
# deploy automatically on pushes to main that touch the doc sources.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2
        with:
          mdbook-version: '0.5.2'

      # The Mermaid preprocessor (declared in book.toml) must be on
      # PATH or `mdbook build` fails; see docs/rfcs/README.md.
      - name: Install mdbook-mermaid
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: mdbook-mermaid@0.17.0

      - name: Build book
        run: mdbook build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
