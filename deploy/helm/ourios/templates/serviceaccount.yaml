{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ourios.serviceAccountName" . }}
  labels:
    {{- include "ourios.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
{{- /*
Role-scoped ServiceAccounts (least-privilege object-store access, README
"Per-role IAM"): one per role that opts in via .serviceAccount.create.
automount follows the shared serviceAccount setting.
*/ -}}
{{- range $role := splitList " " (include "ourios.roles" $) }}
{{- $sa := (index $.Values $role).serviceAccount | default dict }}
{{- if $sa.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ourios.roleServiceAccountName" (dict "root" $ "role" $role) }}
  labels:
    {{- include "ourios.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $role }}
  {{- with $sa.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $.Values.serviceAccount.automount }}
{{- end }}
{{- end }}
