name: Container image

# Build, push, and sign the production `ourios-server` OCI image (first
# shipping milestone, workstream A). Multi-arch (linux/amd64 + linux/arm64):
# each architecture is built on its own NATIVE runner — no QEMU emulation, so
# the arm64 leg no longer recompiles the workspace under emulation — then the
# per-arch images are merged into one manifest list and signed keyless with
# cosign (Sigstore OIDC, no key secret). Triggered by version tags;
# `workflow_dispatch` lets the image be verified post-merge without cutting a
# tag (the local environment has no Docker, mirroring the ClusterFuzzLite
# setup; a dispatch run gets a :sha tag).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least privilege at the top; each job widens to exactly what it needs.
permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build ${{ matrix.variant }} ${{ matrix.platform-spec.platform }}
    strategy:
      fail-fast: false
      matrix:
        # Three variants (#263): `cc` = glibc binary on distroless/cc
        # (`Dockerfile`, the default tags); `static` = musl static binary
        # on distroless/static (`-static` tags); `scratch` = the same musl
        # binary on bare `scratch` (`-scratch` tags). static and scratch
        # are stage targets of the one `Dockerfile.static`, so the builder
        # layer cache is shared between them.
        variant: [cc, static, scratch]
        platform-spec:
          - platform: linux/amd64
            pair: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            pair: linux-arm64
            runner: ubuntu-24.04-arm
        include:
          - variant: cc
            dockerfile: Dockerfile
            target: ''
          - variant: static
            dockerfile: Dockerfile.static
            target: runtime-static
          - variant: scratch
            dockerfile: Dockerfile.static
            target: runtime-scratch
    runs-on: ${{ matrix.platform-spec.runner }}
    permissions:
      contents: read
      # Push the per-arch image (by digest) + its attestations to GHCR.
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Labels only here; the tags are applied once, to the manifest list, in
      # the merge job. `matrix.pair` is the dashed platform (a `/` is invalid in
      # an artifact name and noisy in a cache scope).
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.IMAGE }}

      - id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform-spec.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit-generated supply-chain attestations, per arch.
          provenance: mode=max
          sbom: true
          # Per-arch GHA layer cache — native build, but caching still keeps
          # incremental release builds fast. Scoped per dockerfile+platform:
          # static and scratch build from the same Dockerfile.static builder
          # stage, so they share one cache instead of compiling musl twice.
          cache-from: type=gha,scope=${{ matrix.dockerfile }}-${{ matrix.platform-spec.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile }}-${{ matrix.platform-spec.pair }}
          # Push by digest only; the manifest list (with the real tags) is
          # assembled in the merge job. `name-canonical` records the canonical
          # image name so imagetools can reference the pushed digest.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Smoke-test the image
        # Native runner per leg, so the built image executes here. `--help`
        # (clap) proves the binary starts in the distroless runtime — for the
        # static variant that is the "musl static binary actually runs
        # without a libc" acceptance check from #263.
        env:
          REF: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
        run: docker run --rm "$REF" --help

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.platform-spec.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge manifest + sign (${{ matrix.variant }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        # One manifest list per variant. The musl variants' tags carry a
        # suffix (0.2.2-static, latest-scratch, …) via the flavor block
        # below; the cc variant keeps the unsuffixed default tags.
        variant: [cc, static, scratch]
        include:
          - variant: cc
            suffix: ''
          - variant: static
            suffix: '-static'
          - variant: scratch
            suffix: '-scratch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Push the manifest list to GHCR.
      packages: write
      # Keyless cosign signing via the Sigstore OIDC flow.
      id-token: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        # The per-arch manifests already carry OCI labels (the build job's
        # `labels:`); GHCR's package page reads the **index** annotations,
        # which `imagetools create` does not inherit — emit them here and
        # attach below (#364).
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ env.IMAGE }}
          # Explicit tags only — suppresses the default branch tag (e.g.
          # ":main") on workflow_dispatch. On a v* tag push this yields the
          # semver tags; dispatch runs get a :sha tag.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          # `onlatest` extends the suffix to the auto `latest` tag
          # (`latest-static`); empty suffix (cc) is a no-op.
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true

      - name: Create manifest list and push
        working-directory: /tmp/digests
        # Tags and annotations are built as bash arrays: annotation values
        # (e.g. the image description) can contain spaces, which naked
        # command substitution would word-split, and substituted quotes are
        # literal characters, not shell syntax. The digest refs keep the
        # `printf` substitution (SC2046) — hex digests never contain spaces.
        run: |
          mapfile -t tag_args < <(jq -r '.tags[] | "-t", .' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          # Annotations are NOT in the action's json output (tags + labels
          # only) — they arrive newline-separated in the dedicated env var.
          annotation_args=()
          while IFS= read -r annotation; do
            [ -n "$annotation" ] && annotation_args+=("--annotation" "$annotation")
          done <<< "$DOCKER_METADATA_OUTPUT_ANNOTATIONS"
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${annotation_args[@]}" \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Resolve manifest-list digest
        id: digest
        # Inspect by the first pushed tag (already fully suffixed by the
        # flavor block) rather than reconstructing it from the `version`
        # output.
        run: |
          ref="$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          digest="$(docker buildx imagetools inspect "$ref" --format '{{json .Manifest}}' | jq -r .digest)"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: cosign sign (keyless)
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
          IMAGE: ${{ env.IMAGE }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
