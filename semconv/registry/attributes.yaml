groups:
  - id: registry.ourios
    type: attribute_group
    display_name: Ourios attributes
    brief: Attributes shared across Ourios telemetry.
    attributes:
      - id: ourios.tenant
        type: string
        stability: development
        brief: The tenant the telemetry pertains to.
        examples: ["acme", "t-0042"]
      - id: ourios.service
        type: string
        stability: development
        brief: >-
          The source service of the ingested logs (the log record's own
          `service.name`). Distinct from Ourios's own `service.name`
          resource attribute, which identifies the Ourios process.
        examples: ["checkout", "billing"]
      - id: ourios.miner.template_change
        type:
          members:
            - id: widened
              value: "template_widened"
              stability: development
              brief: A wildcard position was widened to absorb a new line.
            - id: type_expanded
              value: "template_type_expanded"
              stability: development
              brief: A slot's type set grew to admit a new parameter type.
        stability: development
        brief: >-
          The kind of template change an `ourios.miner.merges` event
          records.
      - id: ourios.io.direction
        type:
          members:
            - id: read
              value: "read"
              stability: development
              brief: Bytes read from input files.
            - id: write
              value: "write"
              stability: development
              brief: Bytes written to the consolidated file.
        stability: development
        brief: The I/O direction (mirrors `disk.io.direction`).
      - id: ourios.compaction.result
        type:
          members:
            - id: committed
              value: "committed"
              stability: development
              brief: A consolidation was committed.
            - id: noop
              value: "noop"
              stability: development
              brief: A candidate that consolidated nothing.
            - id: error
              value: "error"
              stability: development
              brief: A partition skipped due to an error (resilient sweep).
        stability: development
        brief: The outcome of a compaction sweep or partition.
      - id: ourios.sink.flush.trigger
        type:
          members:
            - id: size
              value: "size"
              stability: development
              brief: >-
                The partition's buffered bytes reached the size target
                (RFC 0014 §3.2) — the healthy, right-sizing path.
            - id: age
              value: "age"
              stability: development
              brief: >-
                The partition's oldest record reached `max_buffer_age`
                (the batch-window age sweep) — bounds low-volume staleness.
            - id: rotation
              value: "rotation"
              stability: development
              brief: >-
                Every partition force-flushed because the WAL segment
                rotated (also covers the graceful-shutdown and
                post-recovery drains — all flush every partition).
            - id: ceiling
              value: "ceiling"
              stability: development
              brief: >-
                An inline flush to keep total buffered bytes under the
                hard ceiling (RFC0014.4) — indicates memory backpressure.
        stability: development
        brief: Why the record sink flushed a partition (RFC 0014 §3.2).
      - id: ourios.query.kind
        type:
          members:
            - id: logs
              value: "logs"
              stability: development
              brief: A logs DSL query (`run_query`).
            - id: drift
              value: "drift"
              stability: development
              brief: A template-drift query (`run_drift`).
        stability: development
        brief: The kind of query served by the querier endpoint (RFC 0016).
      - id: ourios.query.row_group.state
        type:
          members:
            - id: scanned
              value: "scanned"
              stability: development
              brief: A row group `DataFusion` read to answer the query.
            - id: pruned
              value: "pruned"
              stability: development
              brief: >-
                A row group skipped via partition / statistics pruning
                (pillar #1's footer-skip; the B1 win).
        stability: development
        brief: >-
          Whether a candidate row group was scanned or pruned. The two
          states partition the query's candidate row groups (their sum is
          the total), so the B1 pruned fraction is derived in the backend
          as `pruned / (scanned + pruned)` (RFC 0016; OTel usage/state
          convention — record raw counts, derive the ratio).
