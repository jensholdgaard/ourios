name: Build and deploy docs

# Builds the mdBook and deploys to GitHub Pages. The §6.7 gate (the
# `ourios-wal` crash-recovery test landing) has cleared and Pages is
# enabled (Settings → Pages → Source: GitHub Actions), so docs now
# deploy automatically on pushes to main that touch the doc sources.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # The Mermaid preprocessor (declared in book.toml) must be on
      # PATH or `mdbook build` fails; see docs/rfcs/README.md.
      - name: Install mdBook + mdbook-mermaid
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: mdbook@0.5.2,mdbook-mermaid@0.17.0

      - name: Build book
        run: mdbook build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
