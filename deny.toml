# cargo-deny configuration — the supply-chain gate run by the `cargo-deny`
# CI job and locally via `cargo deny check`. Four checks: security
# advisories, license compatibility, banned/duplicate crates, and crate
# sources. Lint levels: deny (fails) | warn (notes) | allow (silent).

[advisories]
# RustSec advisory DB. Vulnerabilities always fail in this schema; yanked
# crates also fail. `ignore` holds advisories we have reviewed and accepted
# (each entry should carry a `# reason:` note); empty means none accepted.
yanked = "deny"
ignore = [
    # reason: paste is unmaintained (RUSTSEC-2024-0436) but carries no security
    # vulnerability — a deep transitive proc-macro of arrow/datafusion that we
    # cannot replace until upstream drops it. Re-evaluate when that happens.
    "RUSTSEC-2024-0436",
    # reason: quick-xml < 0.41 DoS advisories (quadratic duplicate-attribute
    # check; unbounded namespace-declaration allocation). Transitive via
    # object_store — no upgrade path exists yet: datafusion 53.1 pins
    # object_store ^0.13, and even object_store 0.14 pins quick-xml ^0.40,
    # both below the patched >=0.41. Exposure is low: quick-xml only parses
    # XML responses from the operator-configured S3 endpoint (trusted
    # infrastructure), and the impact is DoS, not corruption or RCE. Remove
    # when an object_store release takes quick-xml >=0.41 (likely via the
    # DataFusion/Arrow upgrade, epic #314).
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# Allow-list of permissive and public-domain-equivalent licenses compatible
# with the project's Apache-2.0 licensing. A dependency under any license not
# listed here fails the check and must be reviewed — either add it with
# justification or drop the dependency. `exceptions` is for per-crate SPDX
# clarifications.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []
# The allow-list is a stable permissive baseline; the set of licenses actually
# encountered varies by target/platform, so don't warn on allowed-but-unused
# entries (they are not policy violations).
unused-allowed-license = "allow"

[bans]
# Duplicate versions are a warning, not an error: transitive version churn is
# common and not itself a defect. Wildcard version requirements on crates.io
# deps are denied; intra-workspace path deps may use them.
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
# Only crates.io (and explicitly allow-listed git sources, if ever needed)
# are permitted as crate origins.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
