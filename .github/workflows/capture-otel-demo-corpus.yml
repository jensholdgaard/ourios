name: Capture OTel Demo corpus

# Runs the OpenTelemetry Demo on a hosted runner, captures the
# logs its services emit into an OTLP/JSON corpus, and uploads
# that corpus as a workflow artifact.
#
# Why: telemetrygen (the `bench.yml` default) emits a single
# uniform body, so Drain collapses it to one template and A1
# (compression) can't show the template-mining win — the first
# real dispatch measured 1 template / A1 delta 0.95×. The demo's
# ~20 services emit dozens of distinct log statements with varied
# attributes — real template + envelope diversity, which is what
# the thesis-gate A1 needs to be a meaningful measurement.
#
# This is **CI Docker** (preinstalled on the GitHub-hosted
# runner), not a local install — the project's "containerd, not
# Docker, locally" rule is about developer machines. The demo
# only ships a docker-compose stack, and a hosted runner is the
# right venue for a one-time corpus mint.
#
# **First-cut scope.** This workflow uploads the corpus as a
# workflow **artifact** + a diversity manifest so we can confirm
# the demo runs on a runner and inspect what we captured (size,
# template diversity) before committing to the release-asset +
# bench-fetch machinery. Promoting the corpus to a versioned
# release asset and wiring `bench.yml`'s `capture: otel-demo`
# path to fetch it is the follow-up once this is validated.

on:
  workflow_dispatch:
    inputs:
      demo_ref:
        description: opentelemetry-demo git tag to capture from
        default: '2.2.0'
        required: false
      duration_seconds:
        description: Capture window in seconds (after warmup)
        default: '600'
        required: false
      warmup_seconds:
        description: Seconds to let the demo reach steady state before capturing
        default: '90'
        required: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    name: capture demo corpus
    runs-on: ubuntu-latest
    # Image pulls (~20 services) + warmup + capture window. 45m
    # is a generous ceiling; a hung step shouldn't burn toward
    # GitHub's 6h job limit.
    timeout-minutes: 45
    env:
      # Host directory bind-mounted into the collector at
      # `/capture` (see the compose override). The fileexporter
      # writes `logs.jsonl` here, so the corpus lands straight on
      # the runner filesystem.
      OURIOS_CAPTURE_DIR: ${{ github.workspace }}/captured
      # `COMPOSE_FILE` (colon-separated on Linux) layers our
      # override onto the demo's base compose for every
      # `docker compose` call without repeating `-f`. The base
      # path is relative (resolved from the `demo` working-dir);
      # the override is absolute so it's project-dir-independent.
      COMPOSE_FILE: docker-compose.yml:${{ github.workspace }}/.github/otel-demo-capture-compose-override.yml
    steps:
      - name: Checkout ourios (for the collector overlay)
        uses: actions/checkout@v4

      - name: Clone opentelemetry-demo
        env:
          DEMO_REF: ${{ inputs.demo_ref }}
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch "$DEMO_REF" \
            https://github.com/open-telemetry/opentelemetry-demo demo

      - name: Inject the file/corpus collector overlay
        run: |
          set -euxo pipefail
          # The demo mounts ./src/otel-collector/otelcol-config-extras.yml
          # into the collector and merges it over the base config
          # (see OTEL_COLLECTOR_CONFIG_EXTRAS in the demo .env).
          # Overwriting that file is the most robust injection —
          # no env wrangling, the compose mount path is unchanged.
          cp .github/otel-demo-capture-extras.yml \
            demo/src/otel-collector/otelcol-config-extras.yml
          echo '--- effective extras ---'
          cat demo/src/otel-collector/otelcol-config-extras.yml

      - name: Bring up the demo
        working-directory: demo
        run: |
          set -euxo pipefail
          # The capture dir must exist before `up` so the bind
          # mount points at a real host directory; the collector
          # then creates logs.raw.jsonl inside it.
          mkdir -p "$OURIOS_CAPTURE_DIR"
          # World-writable so the fileexporter can create the file
          # regardless of the collector's UID. The demo pins
          # `user: 0:0` (root) on otel-collector today, but the
          # otelcol-contrib image's own default is UID 10001 — if
          # the demo ever drops the override the bind mount would
          # otherwise fail with EACCES, and a wrong guess here
          # costs a full ~15-min dispatch to discover.
          chmod 0777 "$OURIOS_CAPTURE_DIR"
          # Released demo versions reference prebuilt ghcr images,
          # so `up -d` pulls rather than builds. COMPOSE_FILE (job
          # env) layers in our /capture mount override.
          docker compose up -d
          docker compose ps

      - name: Wait for the traffic path to be ready
        working-directory: demo
        run: |
          set -euxo pipefail
          # We bypass frontend-proxy (Envoy) — its baked image
          # config crash-loops in CI (see the compose override) —
          # and drive the `frontend` HTTP API directly. So gate on
          # otel-collector (the capture sink) and frontend (the
          # load target) reaching running state. Neither defines a
          # healthcheck and frontend only publishes an ephemeral
          # host port, so "running" + the post-restart settle +
          # the steady-state slice (which discards early ramp
          # errors) is the readiness story rather than an HTTP
          # probe.
          want_running() {
            local svc="$1"
            for _ in $(seq 1 60); do
              docker compose ps --status running --services 2>/dev/null \
                | grep -qx "$svc" && { echo "$svc running"; return 0; }
              sleep 5
            done
            echo "::error::$svc did not reach running state"
            docker compose ps
            docker compose logs "$svc" | tail -50 || true
            return 1
          }
          want_running otel-collector
          want_running frontend
          # frontend-proxy is bypassed and crash-loops on its bad
          # baked config; stop it so it stops burning runner CPU
          # and restart-spamming. Nothing else depends on it (it
          # fronts the frontend, not the reverse).
          docker compose stop frontend-proxy 2>/dev/null || true
          # Restart the load generator once frontend is up so it
          # ramps cleanly against a live target; any residual early
          # errors are discarded by the steady-state slice.
          docker compose restart load-generator
          docker compose ps

      - name: Capture steady-state window
        working-directory: demo
        env:
          WARMUP: ${{ inputs.warmup_seconds }}
          DURATION: ${{ inputs.duration_seconds }}
        run: |
          set -euxo pipefail
          raw="$OURIOS_CAPTURE_DIR/logs.raw.jsonl"
          # Let the restarted load generator ramp + the services
          # reach steady state before we mark the window start.
          echo "settling for ${WARMUP}s"
          sleep "$WARMUP"
          # Mark the raw-file line offset: everything already
          # written (startup + pre-restart load-gen errors) is
          # excluded from the corpus. `|| echo 0` covers the file
          # not existing yet (no logs flushed — would fail the
          # verify step downstream).
          start_line="$(wc -l < "$raw" 2>/dev/null || echo 0)"
          echo "CAPTURE_START_LINE=${start_line}" >> "$GITHUB_ENV"
          echo "steady-state window starts at raw line ${start_line}; capturing ${DURATION}s"
          sleep "$DURATION"

      - name: Slice steady-state corpus + verify
        working-directory: demo
        run: |
          set -euxo pipefail
          raw="$OURIOS_CAPTURE_DIR/logs.raw.jsonl"
          out="$OURIOS_CAPTURE_DIR/logs.jsonl"
          # Stop the collector so the raw file stops growing while
          # we slice (the rest of the stack can keep running until
          # teardown).
          docker compose stop otel-collector || true
          if [ ! -s "$raw" ]; then
            echo "::error::no raw capture at $raw (collector wrote nothing)"
            docker compose ps
            docker compose logs otel-collector | tail -50 || true
            exit 1
          fi
          # Steady-state slice: everything after the marked offset.
          tail -n +"$((CAPTURE_START_LINE + 1))" "$raw" > "$out"
          if [ ! -s "$out" ]; then
            echo "::error::steady-state slice is empty (no logs after line $CAPTURE_START_LINE of $(wc -l < "$raw"))"
            exit 1
          fi
          echo "raw $(wc -l < "$raw") lines → steady-state $(wc -l < "$out") lines"

      - name: Tear down
        if: always()
        working-directory: demo
        run: docker compose down -v || true

      - name: Build diversity manifest
        env:
          # Via `env:`, not `${{ … }}` splicing into the script —
          # a dispatcher-controlled input expanded inline is a
          # template-injection vector (the same rule the clone +
          # capture steps already follow).
          DEMO_REF: ${{ inputs.demo_ref }}
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/captured"
          lines="$(wc -l < logs.jsonl)"
          bytes="$(stat -c%s logs.jsonl)"
          {
            echo "# OTel Demo corpus capture"
            echo
            echo "- demo_ref: ${DEMO_REF}"
            echo "- records (lines): ${lines}"
            echo "- bytes: ${bytes}"
            echo
            echo "## Distinct service.name values seen"
            # Sketch of envelope diversity — how many distinct
            # emitting services landed in the corpus.
            grep -o '"service.name"[^}]*"stringValue":"[^"]*"' logs.jsonl \
              | grep -o '"stringValue":"[^"]*"$' | sort | uniq -c | sort -rn | head -40 || true
          } > manifest.md
          echo '--- manifest ---'
          cat manifest.md

      - name: Upload corpus + manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: otel-demo-corpus
          path: |
            captured/logs.jsonl
            captured/logs.raw.jsonl
            captured/manifest.md
          if-no-files-found: warn
