<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 100" role="img" aria-label="Ourios">
  <style>.m{fill:#1F5FA8}@media (prefers-color-scheme:dark){.m{fill:#4C86C6}}</style>
  <!-- sail: right triangle; wind/log lines: stripes clipped by the sail's
       mirror image (left ends on the ghost hypotenuse), right edges ragged
       like lines of a log file -->
  <path class="m" d="M58 4 L58 96 L122 96 Z"/>
  <rect class="m" x="42"   y="22.5" width="8"    height="9" rx="4.5"/>
  <rect class="m" x="28.8" y="41.5" width="15"   height="9" rx="4.5"/>
  <rect class="m" x="15.6" y="60.5" width="34.4" height="9" rx="4.5"/>
  <rect class="m" x="2.4"  y="79.5" width="38"   height="9" rx="4.5"/>
</svg>
