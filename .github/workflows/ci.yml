name: CI

# Mirrors the verification list in CLAUDE.md §6.6. Runs on every PR
# and push to main. Cargo jobs operate on the workspace Cargo.toml at
# repo root (currently empty `members = []` until the first crate lands;
# cargo handles this cleanly).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege default for the whole workflow.
permissions:
  contents: read

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The [workspace.lints.rustdoc] levels are the single source of
      # truth: the deny-level lints (broken intra-doc links etc.,
      # #124) fail this build on their own; no RUSTDOCFLAGS override,
      # so `bare_urls = "warn"` stays advisory in CI too.
      - run: cargo doc --workspace --no-deps --all-features

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Free runner disk space
        run: .github/scripts/free-disk-space.sh
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # RFC 0028 slice 5: nextest schedules per-test processes in parallel
      # (12x the warm suite wall time locally — epic #382). Doctests are not
      # in nextest's model, so `cargo test --doc` keeps them covered — the
      # pair preserves the exact suite inventory (RFC0028.5).
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --all-features --no-fail-fast --profile ci
      - run: cargo test --workspace --all-features --doc
      # Codecov Test Analytics (informational, like the coverage job):
      # nextest's JUnit report (the `ci` profile in .config/nextest.toml)
      # feeds run times / failure rates / flake detection. `!cancelled()`
      # so failing runs still upload — failure data is the point — and
      # `continue-on-error` keeps an uploader outage from failing this
      # required job. Same action + pin as the coverage upload
      # (`test-results-action` is deprecated in its favor); doctests are
      # not in nextest's model and stay out of the report.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          report_type: test_results
          files: target/nextest/ci/junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # RFC 0013 S3 integration tests (RFC0013.1/.3/.4/.7): spin LocalStack
  # (S3-compatible, Apache-2.0) via testcontainers and drive `Store::s3` at it
  # through the endpoint override. The tests are `#[ignore]`d (they need a
  # Docker-API runtime, which GitHub Actions has but local containerd does
  # not), so this job runs them explicitly by name via `--ignored`. The
  # `AWS_*` env feeds object_store's credential chain — LocalStack accepts any
  # credentials. A required check (in `ci-success`'s `needs`).
  s3-integration:
    name: s3 integration (localstack)
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # `--exact` with an explicit list (not bare `--ignored`) so the deferred
      # `rfc0013_8_reader_forward_compat_over_store` `todo!()` stub stays
      # un-run. The RFC 0019 Store-migration localstack tests join the list as
      # they land (querier/compactor/audit + the Store listing/delete helpers).
      - run: >
          cargo test -p ourios-parquet --test it --
          --ignored --exact
          rfc0013_object_store::rfc0013_1_round_trip_through_s3_backend
          rfc0013_object_store::rfc0013_3_atomic_publish_under_contention
          rfc0013_object_store::rfc0013_4_manifest_swap_via_conditional_put
          rfc0013_object_store::rfc0013_7_s3_compatible_endpoint_via_override
          rfc0013_object_store::store_list_enumerates_keys_on_s3
          rfc0013_object_store::store_list_common_prefixes_rolls_up_on_s3
          rfc0013_object_store::store_list_with_sizes_reports_byte_lengths_on_s3
          rfc0013_object_store::store_delete_blocking_removes_on_s3
          rfc0013_object_store::compact_partition_consolidates_on_s3_via_cas
          rfc0013_object_store::parquet_audit_sink_persists_to_s3
      # RFC 0033 §3.4 S3 publish arm: the template-map artifact's
      # conditional-put ladder (create / lost create / If-Match swap /
      # lost swap) against the same LocalStack.
      - run: >
          cargo test -p ourios-querier --test it --
          --ignored --exact
          rfc0033_cached_template_map::template_map_publish_cas_on_s3
      # RFC 0019 server-level §5 scenarios (.2/.3/.4/.5): spawn the
      # `ourios-server` binary configured for the S3 backend against the same
      # LocalStack, driven over HTTP. `--exact` (RFC0019.1/.6/.7 are non-ignored
      # unit tests that run in the normal `test` job).
      - run: >
          cargo test -p ourios-server --test it --
          --ignored --exact
          rfc0019_storage_backend::rfc0019_2_wal_stays_local_under_s3
          rfc0019_storage_backend::rfc0019_3_ingest_query_end_to_end_on_s3
          rfc0019_storage_backend::rfc0019_4_compaction_operates_on_s3
          rfc0019_storage_backend::rfc0019_5_tenant_isolation_on_s3

  # RFC 0029 §5 .7: the Dex end-to-end acceptance arm — a real Dex
  # container (testcontainers) mints client-credentials tokens the served
  # binary verifies against Dex's real JWKS. `#[ignore]`d in the default
  # run (needs Docker), executed here by exact name — the same pattern as
  # the localstack job above. The image is Dex `master` pinned by digest:
  # the client-credentials grant + `clientCredentialsClaims` are merged
  # upstream but not yet in a release (post-v2.45.1); bump to the release
  # tag when Dex v2.46 ships. A required check (in `ci-success`'s
  # `needs`).
  dex-oidc:
    name: dex oidc (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: >
          cargo test -p ourios-server --test it --
          --ignored --exact
          rfc0029_oidc::dex::rfc0029_7_dex_end_to_end

  collector-interop:
    name: collector interop (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # A real otelcol-contrib container exports OTLP to a served Ourios over
      # TLS + OIDC (Dex); the test asserts the lines land under the JWT tenant.
      - run: >
          cargo test -p ourios-server --test it --
          --ignored --exact
          collector_interop::collector_exports_over_tls_and_oidc

  # RFC0031.1 (comparative evaluation vs Loki): the shared OTLP fixture is
  # ingested by BOTH systems — Ourios in-process, Loki as a real container —
  # queried equivalently (logs DSL / LogQL), and the answers must be
  # multiset-identical. Needs Docker, so the tests are #[ignore]d and this
  # job runs them explicitly (the dex-oidc / collector-interop pattern). A
  # required check (in `ci-success`'s `needs`). The backdated arm (#538
  # item 2) exercises the days-old wide-time-range query-routing regime the
  # frozen-corpus dispatch runs in, on the dispatch's exact Loki flags.
  loki-interop:
    name: loki interop (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Module-qualified names (the #499 split moved these into
      # `interop`); a bare name here would match NOTHING and still exit
      # 0 — the trailing grep turns that silent no-op into a hard fail
      # (pipefail keeps a real test failure fatal through the tee).
      - run: |
          set -euo pipefail
          cargo test -p ourios-bench --test rfc0031_comparative -- \
            --ignored --exact \
            interop::rfc0031_1_result_set_equivalence \
            interop::rfc0031_backdated_wide_range_interop \
            2>&1 | tee loki-interop.log
          grep -q "test result: ok. 2 passed" loki-interop.log

  book:
    name: mdbook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # mdbook-mermaid: RFC diagrams are Mermaid (docs/rfcs/README.md).
      # The preprocessor is declared in book.toml, so the binary must be
      # on PATH or `mdbook build` fails with "preprocessor not found".
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: mdbook@0.5.2,mdbook-mermaid@0.17.0
      - run: mdbook build

  # Validate the OTel semantic-conventions registry (metric/attribute
  # names, units, instruments) with `weaver registry check`, and prove
  # the generated `ourios-semconv` constants are in sync with it
  # (`weaver registry generate` + a no-diff check) — together these keep
  # Ourios's telemetry names spec-adherent and drift-free (RFC 0009
  # §3.6). A required check (in `ci-success`'s `needs`).
  semconv:
    name: semconv (weaver)
    runs-on: ubuntu-latest
    env:
      WEAVER_VERSION: v0.23.0
      # sha256 of weaver-x86_64-unknown-linux-gnu.tar.xz for WEAVER_VERSION
      # (open-telemetry/weaver release asset). Bump both together.
      WEAVER_SHA256: a9822c712d6871bd89d6530f18c5df5cea3821f642e7b8e5e49e985917f7d12d
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
          components: rustfmt
      - name: Install weaver
        run: |
          set -euo pipefail
          tarball="weaver-x86_64-unknown-linux-gnu.tar.xz"
          curl -fsSL -o "$RUNNER_TEMP/$tarball" \
            "https://github.com/open-telemetry/weaver/releases/download/${WEAVER_VERSION}/${tarball}"
          echo "${WEAVER_SHA256}  $RUNNER_TEMP/$tarball" | sha256sum -c -
          tar xJf "$RUNNER_TEMP/$tarball" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/weaver-x86_64-unknown-linux-gnu" >> "$GITHUB_PATH"
      - run: weaver registry check -r semconv/registry --future
      # Codegen no-diff: regenerate the ourios-semconv constants from the
      # registry and fail if the checked-in file drifts (the generated
      # module is "do not hand-edit"; the registry is the source).
      - name: Regenerate ourios-semconv constants
        run: |
          set -euo pipefail
          weaver registry generate rust crates/ourios-semconv/src \
            -t templates -r semconv/registry --future
          cargo fmt -p ourios-semconv
      - name: Verify generated constants are in sync
        # `git status --porcelain` (not `git diff`) so the guard also
        # catches *new* untracked files the generator might emit, not
        # just edits to the tracked module.
        run: |
          set -euo pipefail
          changes="$(git status --porcelain -- crates/ourios-semconv/src)"
          if [ -n "$changes" ]; then
            echo "::error::ourios-semconv is out of sync with semconv/registry/. Regenerate (see the crate header) and commit."
            echo "$changes"
            git diff -- crates/ourios-semconv/src
            exit 1
          fi

  # Emission-time semconv conformance: boot the real `ourios-server`,
  # point its OTLP export (metrics + the dogfooded logs signal) at
  # `weaver registry live-check`, drive a little traffic, and gate on the
  # exit code — weaver exits non-zero on a `violation` (an unregistered
  # metric/attribute/event name, wrong instrument, …), while
  # improvement-level advice (e.g. `stability: development`, expected
  # pre-1.0) passes. Complements the `semconv` job: that one validates
  # the registry *definitions*; this one validates what the binary
  # actually *emits* against them. A required check (in `ci-success`'s
  # `needs`).
  live-check:
    name: live-check (weaver)
    runs-on: ubuntu-latest
    env:
      WEAVER_VERSION: v0.23.0
      # sha256 of weaver-x86_64-unknown-linux-gnu.tar.xz for WEAVER_VERSION
      # (open-telemetry/weaver release asset). Bump both together.
      WEAVER_SHA256: a9822c712d6871bd89d6530f18c5df5cea3821f642e7b8e5e49e985917f7d12d
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install weaver
        run: |
          set -euo pipefail
          tarball="weaver-x86_64-unknown-linux-gnu.tar.xz"
          curl -fsSL -o "$RUNNER_TEMP/$tarball" \
            "https://github.com/open-telemetry/weaver/releases/download/${WEAVER_VERSION}/${tarball}"
          echo "${WEAVER_SHA256}  $RUNNER_TEMP/$tarball" | sha256sum -c -
          tar xJf "$RUNNER_TEMP/$tarball" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/weaver-x86_64-unknown-linux-gnu" >> "$GITHUB_PATH"
      - run: cargo build -p ourios-server
      - name: Live-check the emitted telemetry
        run: |
          set -euo pipefail
          workdir="$RUNNER_TEMP/live-check"
          mkdir -p "$workdir/data" "$workdir/wal" "$workdir/report"
          # weaver's OTLP gRPC listener; --include-unreferenced resolves
          # the SDK resource attributes (service.name, telemetry.sdk.*)
          # from the upstream registry the manifest depends on; the
          # inactivity timeout ends the session after the server's
          # shutdown flush goes quiet.
          # The session is ended deterministically via the admin /stop
          # endpoint below; the inactivity timeout is only a generous
          # backstop (a short one could expire during a slow startup's
          # quiet period and end the session before the shutdown flush —
          # a false pass).
          weaver registry live-check -r semconv/registry --future \
            --include-unreferenced \
            --otlp-grpc-port 24317 --admin-port 24320 \
            --inactivity-timeout 120 \
            --format json --output "$workdir/report" &
          weaver_pid=$!
          sleep 3
          # The real binary, all roles' telemetry: its OTLP export
          # (metrics + logs) goes to weaver. The compaction-disabled path
          # exercises a named log event; shutdown flushes both signals.
          OURIOS_BUCKET_ROOT="$workdir/data" \
          OURIOS_WAL_ROOT="$workdir/wal" \
          OURIOS_RECEIVER_ENABLED=1 \
          OURIOS_RECEIVER_GRPC_ADDR=127.0.0.1:24417 \
          OURIOS_RECEIVER_HTTP_ADDR=127.0.0.1:24418 \
          OURIOS_QUERIER_ENABLED=1 \
          OURIOS_QUERIER_HTTP_ADDR=127.0.0.1:24419 \
          OURIOS_QUERIER_MCP_ENABLED=1 \
          OURIOS_COMPACTION_ENABLED=0 \
          OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:24317 \
          OTEL_BLRP_SCHEDULE_DELAY=500 \
            ./target/debug/ourios-server &
          server_pid=$!
          # Drive the query path so its metrics exist in the stream —
          # polled rather than a fixed sleep, so a slow runner's startup
          # can't race the request.
          query_ok=0
          for _ in $(seq 1 30); do
            if curl -sf -X POST 'http://127.0.0.1:24419/v1/query' \
              -H 'X-Ourios-Tenant: t' -H 'Content-Type: text/plain' \
              --data 'service == "t" | range(-1h, now) | limit 10' > /dev/null; then
              query_ok=1
              break
            fi
            sleep 1
          done
          if [ "$query_ok" -ne 1 ]; then
            echo "::error::the querier never accepted the probe query"
            kill -TERM "$server_pid" || true
            exit 1
          fi
          # Drive one MCP tools/call so the `execute_tool` span — and its
          # canonical gen_ai.*/mcp.* attributes (RFC0038.7) — flows to weaver;
          # the query probe above only exercises the HTTP path. Best-effort
          # (the gate is weaver's report, not curl): a handshake hiccup must not
          # spuriously fail the job, but in the happy path this is what makes the
          # attribute-emission conformance (and the genai-relocation exemption)
          # actually exercised in CI.
          mcp_h='Content-Type: application/json'
          mcp_a='Accept: application/json, text/event-stream'
          mcp_init='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci-live-check","version":"0"}}}'
          mcp_session="$(curl -sf --max-time 10 -D - -o /dev/null -X POST 'http://127.0.0.1:24419/mcp' \
            -H "$mcp_h" -H "$mcp_a" -H 'Host: 127.0.0.1' --data "$mcp_init" \
            | tr -d '\r' | awk 'tolower($1)=="mcp-session-id:"{print $2}')" || true
          if [ -n "${mcp_session:-}" ]; then
            curl -sf --max-time 10 -X POST 'http://127.0.0.1:24419/mcp' \
              -H "$mcp_h" -H "$mcp_a" -H 'Host: 127.0.0.1' -H "mcp-session-id: $mcp_session" \
              --data '{"jsonrpc":"2.0","method":"notifications/initialized"}' > /dev/null || true
            curl -sf --max-time 10 -X POST 'http://127.0.0.1:24419/mcp' \
              -H "$mcp_h" -H "$mcp_a" -H 'Host: 127.0.0.1' -H "mcp-session-id: $mcp_session" \
              --data '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"list_templates","arguments":{"tenant":"t"}}}' > /dev/null || true
          else
            echo "::warning::MCP session not established; execute_tool span not exercised in live-check"
          fi
          sleep 1
          # Best-effort: the server may already have exited; the wait +
          # status check below is what enforces the clean exit.
          kill -TERM "$server_pid" || true
          # A graceful SIGTERM shutdown exits 0; anything else (panic,
          # failed drain) must fail this gate — but collect weaver's
          # verdict first so the report still prints on violations.
          server_status=0
          wait "$server_pid" || server_status=$?
          # The server's shutdown flush has been delivered once it exits;
          # end the weaver session deterministically rather than waiting
          # out the inactivity backstop.
          sleep 2
          curl -sf -X POST 'http://127.0.0.1:24320/stop' > /dev/null || true
          weaver_status=0
          wait "$weaver_pid" || weaver_status=$?
          report="$workdir/report/live_check.json"
          # Gate on the report's *filtered* violation count, not weaver's raw
          # exit code. RFC 0038 emits the canonical GenAI/MCP span attributes
          # (gen_ai.*/mcp.*), which semconv v1.42 marks deprecated — "Moved to
          # the OpenTelemetry GenAI semantic conventions repository" — so weaver
          # reports each as a `violation`. weaver cannot take a second registry
          # dependency ("Multiple dependencies is not supported yet"), so we
          # exempt exactly that one relocation advisory for those two namespaces
          # and gate on every other violation. Tracking: #622 (collapse to a
          # single genai dependency once upstream deletes its v1.42 stubs).
          if [ ! -s "$report" ]; then
            echo "::error::weaver live-check produced no report (status $weaver_status)"
            exit 1
          fi
          entities="$(jq '.statistics.total_entities // 0' "$report")"
          if [ "$entities" -eq 0 ]; then
            echo "::error::weaver live-check ingested no telemetry — the server's OTLP export never reached it"
            cat "$report" || true
            exit 1
          fi
          # Coverage visibility: the MCP handshake above is best-effort (its
          # curls are `|| true`), so confirm the `execute_tool` span actually
          # reached weaver — otherwise the gen_ai.*/mcp.* attribute path (and its
          # exemption) went unexercised this run. A miss is a coverage gap, not a
          # binary fault (the HTTP path still validated everything else), so warn
          # loudly rather than fail on a transient handshake hiccup.
          mcp_seen="$(jq '[.. | objects | select(.name? == "gen_ai.operation.name")] | length' "$report")"
          if [ "$mcp_seen" -eq 0 ]; then
            echo "::warning::MCP execute_tool span not observed in live-check — the gen_ai.*/mcp.* attribute + exemption path was not exercised this run (the best-effort MCP handshake likely failed)"
          fi
          unexpected="$(jq '[.. | objects
            | select(.type? == "PolicyFinding" and .level? == "violation")
            | select(( (.id == "deprecated")
                and ((.context.attribute_name // "") | test("^(gen_ai|mcp)\\."))
                and ((.context.deprecation_note // "") | contains("semantic-conventions-genai")) ) | not)
            ] | length' "$report")"
          if [ "$unexpected" -ne 0 ]; then
            echo "::error::weaver live-check found $unexpected non-exempt violation(s) — emitted telemetry drifts from semconv/registry/"
            cat "$report" || true
          fi
          # The exempted gen_ai.*/mcp.* violations make weaver exit non-zero on
          # every clean run, so a non-zero status alone is not a signal. But a
          # non-zero status with *zero* violations in the report means weaver
          # failed for a non-policy reason (internal error) after writing a
          # report — which the filtered gate would otherwise mask. Surface it.
          total_viol="$(jq '[.. | objects | select(.type? == "PolicyFinding" and .level? == "violation")] | length' "$report")"
          if [ "$weaver_status" -ne 0 ] && [ "$total_viol" -eq 0 ]; then
            echo "::warning::weaver exited $weaver_status but reported no violation — a non-policy failure (internal error?) the filtered gate would otherwise mask"
          fi
          if [ "$server_status" -ne 0 ]; then
            echo "::error::ourios-server exited with status $server_status"
          fi
          [ "$unexpected" -eq 0 ] && [ "$server_status" -eq 0 ]
      - name: Upload live-check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: live-check-report
          path: ${{ runner.temp }}/live-check/report/
          if-no-files-found: ignore

  # Supply-chain gate via cargo-deny: RustSec advisories, the license
  # allow-list, banned/duplicate crates, and crate sources. Config is
  # deny.toml at the repo root. A required check (in `ci-success`'s `needs`).
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
      # Pin the cargo-deny version so the required check's behavior (config
      # schema, advisory handling) can't change under us when a new release
      # lands; bump deliberately (Renovate/manual) alongside any deny.toml
      # changes the new version needs.
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny@0.19.8
      - run: cargo deny check

  # Informational coverage report — deliberately NOT gating. It is
  # absent from `ci-success`'s `needs`, and `continue-on-error` makes
  # a coverage hiccup neutral, so it never blocks a merge. Coverage
  # surfaces untested branches/error arms; the percentage is
  # intentionally not a threshold — per CLAUDE.md §6.2 tests are
  # specifications, not a number to game (a `--fail-under` gate would
  # pressure toward shallow tests). `cargo test` (above) remains the
  # real gate. The lcov + HTML report are uploaded as a build artifact.
  #
  # Runs on pushes to main only: on a PR this job re-runs the whole suite
  # under llvm-cov instrumentation, duplicating the gating `test` job for a
  # report that is published from main anyway. Keeping it main-only drops
  # that duplicate PR run while preserving the gate and the badge.
  coverage:
    name: coverage (informational)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Free runner disk space
        run: .github/scripts/free-disk-space.sh
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned); channel via toolchain input
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov
      # Collect once (runs the test suite under instrumentation), then
      # render each format from the same profile data — no double run.
      - run: cargo llvm-cov --workspace --all-features --no-report
      - run: cargo llvm-cov report --summary-only
      - run: cargo llvm-cov report --lcov --output-path lcov.info
      - run: cargo llvm-cov report --html --output-dir coverage-html
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: |
            lcov.info
            coverage-html
          if-no-files-found: error
      # Codecov upload (informational, matching this job's stance and
      # codecov.yml's informational statuses): the same lcov lands on
      # codecov.io for the trend view + the README badge. Main-only
      # like the rest of this job — the deliberate no-PR-coverage-runs
      # decision above stands, so there is no PR diff coverage; lifting
      # that means removing this job's main-only `if`, a separate cost
      # decision. `fail_ci_if_error: false` — an uploader outage must
      # not fail even this informational job's step list.
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Aggregate result so branch-protection rules need only require
  # a single check. Skipped Cargo jobs (pre-first-crate) pass through.
  # NOTE: `coverage` is intentionally excluded — it is informational
  # and must never gate a merge.
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [fmt, clippy, docs, test, book, semconv, live-check, deny, s3-integration, dex-oidc, collector-interop, loki-interop]
    if: always()
    steps:
      - name: Verify required checks
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed (skipped jobs treated as pass)."
