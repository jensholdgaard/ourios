name: Build and deploy docs

# Wired but not yet triggered on push. Flip the commented block below
# once GitHub Pages is enabled in the repo settings and the first
# release milestone has landed.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'docs/**'
  #     - 'book.toml'
  #     - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.5.2'

      - name: Build book
        run: mdbook build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
